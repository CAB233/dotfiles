MBTN_LEFT           ignore
MBTN_LEFT_DBL       cycle pause
MBTN_RIGHT          script-binding playlist_osd/display
WHEEL_UP            add volume 5
WHEEL_DOWN          add volume -5
MBTN_LEFT_DBL       cycle pause

RIGHT               seek  3                          #event: click
RIGHT               no-osd set speed 2.5; set pause no #event: press
RIGHT               ignore                           #event: release
Shift+RIGHT         seek  1 exact
LEFT                seek -3
Shift+LEFT          seek -1 exact
UP                  add volume 5
DOWN                add volume  -5
b                   add sub-delay -0.05
n                   add sub-delay +0.05

m                   cycle mute
f                   cycle fullscreen
ESC                 set fullscreen no
SPACE               cycle pause
z                   add speed -0.5
x                   set speed 1.0
c                   add speed  0.5
Ctrl+q              quit
TAB                 script-binding stats/display-stats-toggle
Ctrl+s              screenshot video
Ctrl+Shift+s        screenshot
